<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Colour Trading - Joining...</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef6ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .vip-tag {
            background: #00b0ff;
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
        }
        h2 { color: #1a237e; margin: 20px 0 5px; font-size: 26px; }
        .subtitle { color: #3f51b5; margin-bottom: 20px; font-weight: 600; }
        
        .feature-box {
            background: #f8faff;
            border: 1px solid #e1e8f5;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        .feature-item { 
            margin: 10px 0; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            color: #333;
            font-size: 16px;
        }
        .icon { margin-right: 12px; }

        /* --- BOHOT BADA ARROW SECTION --- */
        .big-arrow-container {
            margin: 10px 0 -10px 0; /* Button ke kareeb lane ke liye */
        }
        .ultra-big-arrow {
            font-size: 80px; /* Size bohot bada kar diya */
            color: #ff3d00; /* Red-Orange color taaki nazar pade */
            display: inline-block;
            line-height: 1;
            text-shadow: 0px 5px 15px rgba(255, 61, 0, 0.4);
            animation: aggressiveBounce 0.8s infinite; /* Tez animation */
        }

        @keyframes aggressiveBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(15px); }
        }
        /* ------------------------------- */

        .btn {
            display: block;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            text-decoration: none;
            padding: 20px 10px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 20px;
            box-shadow: 0 10px 20px rgba(58, 123, 213, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .btn:hover { transform: scale(1.02); }

        .warning { color: #d32f2f; font-weight: bold; font-size: 15px; margin-top: 25px; }
        
        #timer-text {
            background: #e3f2fd;
            color: #0d47a1;
            font-weight: bold;
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            font-size: 16px;
        }
        .footer-copy { font-size: 11px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <span class="vip-tag">🔥 VIP ACCESS</span>
    <h2>Colour Trading Channel</h2>
    <p class="subtitle">Recover Losses & Earn Daily 💰</p>

    <div class="feature-box">
        <div class="feature-item"><span class="icon">💹</span> Daily High Accuracy Signals</div>
        <div class="feature-item"><span class="icon">🏆</span> Rs. 5000 → Rs. 15000 Profit Target</div>
        <div class="feature-item"><span class="icon">✅</span> 100% Verified & Trusted</div>
    </div>

    <div class="big-arrow-container">
        <span class="ultra-big-arrow">⬇</span>
    </div>

    <a href="https://whatsapp.com/channel/0029Vb0Aa259WtC4dxRbK93y" class="btn">JOIN VIP CHANNEL NOW</a>

    <p class="warning">⚠️ Limited Seats — Join Fast!</p>

    <div id="timer-text">Redirecting in <span id="seconds">9</span>s...</div>
    
    <p class="footer-copy">© 2025 Profit Channel</p>
</div>

<script>
    const targetURL = "https://whatsapp.com/channel/0029Vb0Aa259WtC4dxRbK93y";
    let timeLeft = 9;

    const downloadTimer = setInterval(function() {
        timeLeft--;
        document.getElementById("seconds").textContent = timeLeft;
        
        if (timeLeft <= 0) {
            clearInterval(downloadTimer);
            window.location.href = targetURL;
        }
    }, 1000);
</script>

</body>
</html>
